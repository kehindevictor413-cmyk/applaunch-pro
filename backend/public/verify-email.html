<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email - X∞ Smart Locator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 450px;
      width: 90%;
      text-align: center;
    }

    .logo {
      font-size: 48px;
      font-weight: bold;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .message {
      margin: 20px 0;
      padding: 15px;
      border-radius: 8px;
    }

    .success {
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid #22c55e;
      color: #86efac;
    }

    .error {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid #ef4444;
      color: #fca5a5;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">X∞</div>
    <h1>Email Verification</h1>
    <div id="content">
      <p>Verifying your email...</p>
    </div>
  </div>

  <script>
    async function verifyEmail() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');

      if (!token) {
        document.getElementById('content').innerHTML = `
          <div class="message error">Invalid verification link</div>
          <a href="/login" class="btn">Go to Login</a>
        `;
        return;
      }

      try {
        const response = await fetch(`/api/auth/verify-email?token=${token}`);
        const data = await response.json();

        if (response.ok) {
          document.getElementById('content').innerHTML = `
            <div class="message success">${data.message}</div>
            <a href="/login" class="btn">Go to Login</a>
          `;
        } else {
          document.getElementById('content').innerHTML = `
            <div class="message error">${data.error}</div>
            <a href="/signup" class="btn">Sign Up Again</a>
          `;
        }
      } catch (error) {
        document.getElementById('content').innerHTML = `
          <div class="message error">Verification failed. Please try again.</div>
          <a href="/login" class="btn">Go to Login</a>
        `;
      }
    }

    verifyEmail();
  </script>
</body>
</html>
