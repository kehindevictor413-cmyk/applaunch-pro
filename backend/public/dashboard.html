<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - X∞ Smart Locator</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
    }

    .navbar {
      padding: 15px 30px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-right {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .user-info {
      color: #c0c0c0;
    }

    .btn {
      padding: 8px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn-danger {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px;
    }

    .header {
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px;
    }

    .stat-label {
      color: #a0a0a0;
      font-size: 14px;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: bold;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .devices-section {
      margin-bottom: 30px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .section-header h2 {
      font-size: 24px;
    }

    .devices-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
    }

    .device-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px;
      transition: transform 0.3s;
    }

    .device-card:hover {
      transform: translateY(-5px);
    }

    .device-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 15px;
    }

    .device-name {
      font-size: 20px;
      font-weight: bold;
      color: #fff;
    }

    .device-type {
      font-size: 14px;
      color: #a0a0a0;
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
    }

    .status-badge.online {
      background: rgba(74, 222, 128, 0.2);
      color: #4ade80;
      border: 1px solid #4ade80;
    }

    .status-badge.offline {
      background: rgba(248, 113, 113, 0.2);
      color: #f87171;
      border: 1px solid #f87171;
    }

    .device-info {
      margin-bottom: 15px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .info-label {
      color: #a0a0a0;
    }

    .info-value {
      color: #fff;
    }

    .device-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .device-actions .btn {
      flex: 1;
      min-width: 100px;
      font-size: 13px;
      padding: 8px 15px;
    }

    .map-container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px;
      margin-bottom: 30px;
    }

    #map {
      width: 100%;
      height: 500px;
      border-radius: 8px;
      margin-top: 15px;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
    }

    .modal-content {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      margin: 5% auto;
      padding: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
    }

    .close {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
    }

    .close:hover {
      color: #fff;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #c0c0c0;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
    }

    .tracking-link {
      background: rgba(102, 126, 234, 0.1);
      border: 1px solid #667eea;
      padding: 10px;
      border-radius: 6px;
      margin-top: 10px;
      word-break: break-all;
    }

    .copy-btn {
      margin-top: 10px;
      width: 100%;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #a0a0a0;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    @media (max-width: 768px) {
      .devices-grid {
        grid-template-columns: 1fr;
      }

      .container {
        padding: 15px;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">X∞</div>
    <div class="nav-right">
      <span class="user-info" id="userEmail"></span>
      <button class="btn btn-secondary" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container">
    <div class="header">
      <h1>Dashboard</h1>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total Devices</div>
        <div class="stat-value" id="totalDevices">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Online</div>
        <div class="stat-value" id="onlineDevices">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Offline</div>
        <div class="stat-value" id="offlineDevices">0</div>
      </div>
    </div>

    <div class="map-container">
      <div class="section-header">
        <h2>Live Map</h2>
      </div>
      <div id="map"></div>
    </div>

    <div class="devices-section">
      <div class="section-header">
        <h2>My Devices</h2>
        <button class="btn" onclick="openAddDeviceModal()">+ Add Device</button>
      </div>
      <div class="devices-grid" id="devicesGrid"></div>
    </div>
  </div>

  <div id="addDeviceModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeAddDeviceModal()">&times;</span>
      <h2>Add New Device</h2>
      <form id="addDeviceForm">
        <div class="form-group">
          <label>Device Name</label>
          <input type="text" id="deviceName" required placeholder="e.g., Mom's iPhone">
        </div>
        <div class="form-group">
          <label>Device Type</label>
          <select id="deviceType" required>
            <option value="phone">Phone</option>
            <option value="tablet">Tablet</option>
            <option value="laptop">Laptop</option>
          </select>
        </div>
        <div class="form-group">
          <label>Owner Nickname (Optional)</label>
          <input type="text" id="ownerNickname" placeholder="e.g., Mom">
        </div>
        <button type="submit" class="btn" style="width: 100%;">Register Device</button>
      </form>
      <div id="trackingLinkContainer" style="display: none;">
        <h3 style="margin-top: 20px; margin-bottom: 10px;">Tracking Link Generated!</h3>
        <div class="tracking-link" id="trackingLink"></div>
        <button class="btn copy-btn" onclick="copyTrackingLink()">Copy Link</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    let devices = [];
    let map;
    let markers = {};
    let ws;

    function checkAuth() {
      const token = localStorage.getItem('token');
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      
      if (!token) {
        window.location.href = '/login';
        return;
      }

      document.getElementById('userEmail').textContent = user.email || '';
      loadDevices();
      initMap();
      initWebSocket();
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/login';
    }

    function initMap() {
      map = L.map('map').setView([0, 0], 2);
      
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
      }).addTo(map);
    }

    function initWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

      ws.onopen = () => {
        console.log('WebSocket connected');
        ws.send(JSON.stringify({
          type: 'authenticate',
          token: localStorage.getItem('token')
        }));
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        
        if (data.type === 'location_update') {
          updateDeviceLocation(data.deviceId, data.location);
        } else if (data.type === 'device_status') {
          updateDeviceStatus(data.deviceId, data.status);
        }
      };

      ws.onerror = (error) => {
        console.error('WebSocket error:', error);
      };

      ws.onclose = () => {
        console.log('WebSocket disconnected, reconnecting...');
        setTimeout(initWebSocket, 5000);
      };
    }

    async function loadDevices() {
      try {
        const response = await fetch('/api/devices', {
          headers: {
            'Authorization': `Bearer ${localStorage.getItem('token')}`
          }
        });

        if (!response.ok) throw new Error('Failed to load devices');

        const data = await response.json();
        devices = data.devices;
        
        updateStats();
        renderDevices();
        updateMap();
      } catch (error) {
        console.error('Error loading devices:', error);
      }
    }

    function updateStats() {
      const total = devices.length;
      const online = devices.filter(d => d.isOnline).length;
      const offline = total - online;

      document.getElementById('totalDevices').textContent = total;
      document.getElementById('onlineDevices').textContent = online;
      document.getElementById('offlineDevices').textContent = offline;
    }

    function renderDevices() {
      const grid = document.getElementById('devicesGrid');
      
      if (devices.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📱</div>
            <h3>No devices yet</h3>
            <p>Add your first device to start tracking</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = devices.map(device => `
        <div class="device-card">
          <div class="device-header">
            <div>
              <div class="device-name">${device.deviceName}</div>
              <div class="device-type">${device.deviceType}</div>
            </div>
            <span class="status-badge ${device.isOnline ? 'online' : 'offline'}">
              ${device.isOnline ? 'Online' : 'Offline'}
            </span>
          </div>
          
          <div class="device-info">
            ${device.ownerNickname ? `
            <div class="info-row">
              <span class="info-label">Owner</span>
              <span class="info-value">${device.ownerNickname}</span>
            </div>
            ` : ''}
            ${device.batteryLevel ? `
            <div class="info-row">
              <span class="info-label">Battery</span>
              <span class="info-value">${device.batteryLevel}%</span>
            </div>
            ` : ''}
            ${device.lastSeen ? `
            <div class="info-row">
              <span class="info-label">Last Seen</span>
              <span class="info-value">${formatTime(device.lastSeen)}</span>
            </div>
            ` : ''}
          </div>

          <div class="device-actions">
            ${device.lastLocation ? `
              <button class="btn" onclick="focusDevice('${device.id}')">View on Map</button>
            ` : ''}
            <button class="btn ${device.isLostMode ? 'btn-danger' : ''}" onclick="toggleLostMode('${device.id}', ${!device.isLostMode})">
              ${device.isLostMode ? 'Disable' : 'Enable'} Lost Mode
            </button>
            <button class="btn btn-secondary" onclick="viewHistory('${device.id}')">History</button>
            <button class="btn btn-secondary" onclick="shareLink('${device.id}')">Share Link</button>
          </div>
        </div>
      `).join('');
    }

    function updateMap() {
      Object.values(markers).forEach(marker => map.removeLayer(marker));
      markers = {};

      const bounds = [];

      devices.forEach(device => {
        if (device.lastLocation) {
          const { latitude, longitude } = device.lastLocation;
          const latlng = [latitude, longitude];
          bounds.push(latlng);

          const marker = L.marker(latlng).addTo(map);
          marker.bindPopup(`
            <strong>${device.deviceName}</strong><br>
            ${device.deviceType}<br>
            ${device.isOnline ? '🟢 Online' : '🔴 Offline'}
          `);
          
          markers[device.id] = marker;
        }
      });

      if (bounds.length > 0) {
        map.fitBounds(bounds, { padding: [50, 50] });
      }
    }

    function focusDevice(deviceId) {
      const device = devices.find(d => d.id === deviceId);
      if (device && device.lastLocation) {
        const { latitude, longitude } = device.lastLocation;
        map.setView([latitude, longitude], 15);
        markers[deviceId].openPopup();
      }
    }

    async function toggleLostMode(deviceId, enabled) {
      try {
        const response = await fetch(`/api/devices/${deviceId}/lost-mode`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${localStorage.getItem('token')}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ enabled })
        });

        if (!response.ok) throw new Error('Failed to toggle lost mode');

        await loadDevices();
      } catch (error) {
        alert('Error toggling lost mode: ' + error.message);
      }
    }

    function viewHistory(deviceId) {
      alert('Location history feature - coming soon!');
    }

    function shareLink(deviceId) {
      const device = devices.find(d => d.id === deviceId);
      if (device) {
        navigator.clipboard.writeText(device.trackingLink);
        alert('Tracking link copied to clipboard!');
      }
    }

    function formatTime(timestamp) {
      const date = new Date(timestamp * 1000);
      const now = new Date();
      const diff = Math.floor((now - date) / 1000);

      if (diff < 60) return 'Just now';
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return date.toLocaleDateString();
    }

    function updateDeviceLocation(deviceId, location) {
      const deviceIndex = devices.findIndex(d => d.id === deviceId);
      if (deviceIndex !== -1) {
        devices[deviceIndex].lastLocation = location;
        devices[deviceIndex].isOnline = true;
        updateStats();
        renderDevices();
        updateMap();
      }
    }

    function updateDeviceStatus(deviceId, status) {
      const deviceIndex = devices.findIndex(d => d.id === deviceId);
      if (deviceIndex !== -1) {
        devices[deviceIndex] = { ...devices[deviceIndex], ...status };
        updateStats();
        renderDevices();
      }
    }

    function openAddDeviceModal() {
      document.getElementById('addDeviceModal').style.display = 'block';
      document.getElementById('trackingLinkContainer').style.display = 'none';
      document.getElementById('addDeviceForm').reset();
    }

    function closeAddDeviceModal() {
      document.getElementById('addDeviceModal').style.display = 'none';
    }

    let currentTrackingLink = '';

    document.getElementById('addDeviceForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const deviceName = document.getElementById('deviceName').value;
      const deviceType = document.getElementById('deviceType').value;
      const ownerNickname = document.getElementById('ownerNickname').value;

      try {
        const response = await fetch('/api/devices/register', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${localStorage.getItem('token')}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ deviceName, deviceType, ownerNickname })
        });

        if (!response.ok) throw new Error('Failed to register device');

        const data = await response.json();
        currentTrackingLink = data.device.trackingLink;
        
        document.getElementById('trackingLink').textContent = currentTrackingLink;
        document.getElementById('trackingLinkContainer').style.display = 'block';
        document.getElementById('addDeviceForm').style.display = 'none';

        await loadDevices();
      } catch (error) {
        alert('Error registering device: ' + error.message);
      }
    });

    function copyTrackingLink() {
      navigator.clipboard.writeText(currentTrackingLink);
      alert('Tracking link copied to clipboard!');
    }

    window.onclick = (event) => {
      const modal = document.getElementById('addDeviceModal');
      if (event.target === modal) {
        closeAddDeviceModal();
      }
    };

    checkAuth();
  </script>
</body>
</html>
